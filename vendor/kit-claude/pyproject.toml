[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "kit-claude"
version = "0.1.0"
description = "Claude API wrapper with retries, timeout, and per-call cost logging (Python variant of /kit/ts/claude)"
requires-python = ">=3.11"
dependencies = ["anthropic>=0.40,<1"]

[tool.setuptools.packages.find]
where = ["src"]
