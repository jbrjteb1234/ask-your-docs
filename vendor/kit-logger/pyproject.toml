[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "kit-logger"
version = "0.1.0"
description = "Zero-dependency structured JSON-lines logger (Python variant of /kit/ts/logger)"
requires-python = ">=3.11"

[tool.setuptools.packages.find]
where = ["src"]
